---
deployment:
  tasks:
    - export DEPLOYPATH=/home/cms4netp/simplemicrosites
    - /bin/cp casea.site/.htaccess $DEPLOYPATH/
    - /bin/cp casea.site/config.php $DEPLOYPATH/
    - /bin/cp casea.site/index.php $DEPLOYPATH/
    - /bin/cp casea.site/deploy-webhook.php $DEPLOYPATH/
    - /bin/mkdir -p $DEPLOYPATH/includes
    - /bin/cp casea.site/includes/header.php $DEPLOYPATH/includes/
    - /bin/cp casea.site/includes/footer.php $DEPLOYPATH/includes/
    - /bin/cp casea.site/includes/page-hero.php $DEPLOYPATH/includes/
    - /bin/mkdir -p $DEPLOYPATH/pages
    - /bin/cp casea.site/pages/home.php $DEPLOYPATH/pages/
    - /bin/cp casea.site/pages/bonuses.php $DEPLOYPATH/pages/
    - /bin/cp casea.site/pages/withdrawal.php $DEPLOYPATH/pages/
    - /bin/cp casea.site/pages/support.php $DEPLOYPATH/pages/
    - /bin/cp casea.site/pages/login.php $DEPLOYPATH/pages/
    - /bin/mkdir -p $DEPLOYPATH/assets/css
    - /bin/mkdir -p $DEPLOYPATH/assets/js
    - /bin/cp casea.site/assets/css/base.css $DEPLOYPATH/assets/css/
    - /bin/cp casea.site/assets/css/style.css $DEPLOYPATH/assets/css/
    - /bin/cp casea.site/assets/js/app.js $DEPLOYPATH/assets/js/
    - /bin/mkdir -p $DEPLOYPATH/lang
    - /bin/cp casea.site/lang/en.php $DEPLOYPATH/lang/
