name: Deploy to cPanel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull repo on server via cPanel API
        run: |
          # Trigger git pull on the cPanel server
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository_root=/home/cms4netp/simplemicrosites" \
            -o pull_result.json
          cat pull_result.json
          echo ""

      - name: Deploy via cPanel API
        run: |
          # Trigger .cpanel.yml deployment
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControlDeployment/create?repository_root=/home/cms4netp/simplemicrosites" \
            -o deploy_result.json
          cat deploy_result.json
